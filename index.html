        body {

            padding: 40px 20px;

            font-family: 'Space Mono', monospace;

            flex-direction: column;

            height: 96px;

            border: 2px solid rgba(255,255,255,0.1);

        h1 { font-size: 1.1rem; margin: 10px 0; letter-spacing: 2px; text-transform: uppercase; }

        .container { width: 100%; max-width: 450px; }

        @keyframes buzz {

            60% { transform: translate(1px, 1px); }
            80% { transform: translate(1px, -1px); }
            100% { transform: translate(0); }
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--card-bg);
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 4px;
            text-decoration: none;
            color: white;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .btn-schedule { animation: buzz 0.3s infinite; }
