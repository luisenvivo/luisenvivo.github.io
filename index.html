<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUISENVIVO | Digital Broadcaster & Selector</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #1a1a1a; --card-bg: #000000; --text-color: #ffffff; --accent-blue: #007bff; --accent-green: #28a745; --accent-red: #dc3545; }
        body { margin: 0; padding: 40px 20px; background-color: var(--bg-color); color: var(--text-color); font-family: 'Space Mono', monospace; display: flex; flex-direction: column; align-items: center; }
        
        .profile-pic { 
            width: 96px; 
            height: 96px; 
            border-radius: 50%; 
            background-image: url('https://ugc.production.linktr.ee/09f45ba6-c86f-432d-9b8f-789ae2f3c1ce_IMG-20260109-075612-426.webp?io=true&size=avatar-v3_0'); 
            background-size: cover; 
            margin-bottom: 15px; 
            border: 2px solid rgba(255,255,255,0.1); 
        }

        h1 { font-size: 1.1rem; margin: 10px 0; letter-spacing: 2px; text-transform: uppercase; }
        p { font-size: 0.75rem; opacity: 0.8; margin-bottom: 25px; text-align: center; }
        .social-icons { display: flex; gap: 15px; margin-bottom: 35px; flex-wrap: wrap; justify-content: center; }
        .social-icons a { text-decoration: none; }
        .social-icons svg { width: 22px; height: 22px; fill: white; opacity: 0.9; }
        .container { width: 100%; max-width: 450px; }
        
        @keyframes buzz { 0% { transform: translate(0); } 20% { transform: translate(-1px, 1px); } 40% { transform: translate(-1px, -1px); } 60% { transform: translate(1px, 1px); } 80% { transform: translate(1px, -1px); } 100% { transform: translate(0); } }
        
        .btn-toggle { cursor: pointer; display: flex; align-items: center; justify-content: center; background-color: var(--card-bg); padding: 16px; margin-bottom: 5px; border-radius: 4px; color: white; font-size: 0.8rem; font-weight: bold; letter-spacing: 0.5px; border: none; width: 100%; font-family: inherit; }
        .btn-schedule { animation: buzz 0.3s infinite; }
        
        #schedule-content { 
            display: none; 
            background: #111; 
            padding: 20px; 
            border-radius: 4px; 
            margin-bottom: 12px; 
            font-size: 0.75rem; 
            line-height: 1.8; 
            border: 1px solid var(--accent-blue);
            text-align: center;
        }

        .status-tag { color: var(--accent-green); font-weight: bold; display: block; margin-bottom: 10px; }
        .schedule-line { border-top: 1px solid #333; margin-top: 10px; padding-top: 10px; opacity: 0.7; font-size: 0.65rem; }

        .btn { display: flex; align-items: center; justify-content: center; background-color: var(--card-bg); padding: 16px; margin-bottom: 12px; border-radius: 4px; text-decoration: none; color: white; font-size: 0.8rem; font-weight: bold; letter-spacing: 0.5px; }
        .indicator { width: 10px; height: 10px; border-radius: 50%; margin-right: 12px; }
        .blue { background-color: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .green { background-color: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
        .red { background-color: var(--accent-red); box-shadow: 0 0 8px var(--accent-red); }
        .video-card { background-color: var(--card-bg); border-radius: 4px; overflow: hidden; margin-bottom: 12px; aspect-ratio: 16/9; }
        iframe { width: 100%; height: 100%; border: none; }

        footer {
            margin-top: 40px;
            padding: 20px;
            font-size: 0.65rem;
            opacity: 0.5;
            text-align: center;
            letter-spacing: 1px;
            width: 100%;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="profile-pic"></div>
    <h1>LUISENVIVO</h1>
    <p>Digital Broadcaster & Selector.</p>

    <div class="social-icons">
        <a href="https://twitch.tv/luisenvivo"><svg viewBox="0 0 24 24"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714Z"/></svg></a>
        <a href="https://kick.com/luisenvivo"><svg viewBox="0 0 24 24"><path d="M12 0L1.608 6v12L12 24l10.392-6V6L12 0zm0 17.568L5.076 13.5v-3L12 14.068l6.924-3.568v3L12 17.568z"/></svg></a>
        <a href="https://instagram.com/luisenvivo"><svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg></a>
    </div>

    <div class="container">
        <button onclick="toggleSchedule()" class="btn-toggle btn-schedule">
            <span class="indicator blue"></span> STREAM SCHEDULE (Global Times)
        </button>
        
        <div id="schedule-content">
            <span id="live-status" class="status-tag">CALCULATING SESSION...</span>
            <div id="local-time-info"></div>
            <div class="schedule-line">
                [Follow me on Twitch]
            </div>
        </div>

        <div class="video-card">
            <iframe src="https://player.twitch.tv/?channel=luisenvivo&parent=luisenvivo.github.io&muted=true" allowfullscreen></iframe>
        </div>

        <a href="https://kick.com/luisenvivo" class="btn"><span class="indicator green"></span> KICK LIVE STREAM</a>
        <a href="https://hearthis.at/luisenvivo" class="btn"><span class="indicator red"></span> HEARTHIS.AT | DJ SESSIONS</a>
    </div>

    <footer>
        &copy; 2026 LUISENVIVO. ALL RIGHTS RESERVED.
    </footer>

    <script>
        function toggleSchedule() {
            var content = document.getElementById("schedule-content");
            content.style.display = (content.style.display === "block") ? "none" : "block";
            updateSchedule();
        }

        function updateSchedule() {
            const now = new Date();
            const day = now.getDay();
            const hour = now.getHours();
            let status = "OFFLINE";
            let next = "";

            if (day >= 1 && day <= 5) {
                // Lunes a Viernes: 19:00 - 21:00 ART
                if (hour >= 19 && hour < 21) status = "🔴 LIVE NOW";
                else next = "MON-FRI: 7:00 PM - 9:00 PM (AR)";
            } else if (day === 6) {
                // Sábado: 15:00 - 19:00 ART
                if (hour >= 15 && hour < 19) status = "🔴 LIVE NOW";
                else next = "SATURDAY MARATHON: 3:00 PM - 7:00 PM (AR)";
            } else {
                next = "NEXT SESSION: MONDAY 7:00 PM (AR)";
            }

            document.getElementById("live-status").innerText = status;
            document.getElementById("local-time-info").innerHTML = next + "<br><small>Your Timezone: " + Intl.DateTimeFormat().resolvedOptions().timeZone + "</small>";
        }
    </script>
</body>
</html>
